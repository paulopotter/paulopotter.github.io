<!DOCTYPE html><html lang="pt-BR" data-info="2026-03-27 15:57:45" prefix="og: https://ogp.me/ns#"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/css/3d4c49d454f5110f.css" as="style"/><link rel="stylesheet" href="/_next/static/css/3d4c49d454f5110f.css" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-3ef8e75666f782d3.js" defer=""></script><script src="/_next/static/chunks/framework-4556c45dd113b893.js" defer=""></script><script src="/_next/static/chunks/main-d1c8bf56a477bf12.js" defer=""></script><script src="/_next/static/chunks/pages/_app-b8e294211c93df66.js" defer=""></script><script src="/_next/static/chunks/893-17f579bb50e4a392.js" defer=""></script><script src="/_next/static/chunks/802-de3e46956eb8ef9a.js" defer=""></script><script src="/_next/static/chunks/pages/%5Bslug%5D-3a291bcd4ae09a3a.js" defer=""></script><script src="/_next/static/BHi7l169sg06t5aPl75mJ/_buildManifest.js" defer=""></script><script src="/_next/static/BHi7l169sg06t5aPl75mJ/_ssgManifest.js" defer=""></script></head><body><div id="__next"></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"post":{"title":"Criando sua primeira APP para Smart TVs","category":["Smart TV","Js","React"],"date":"2020-01-19","cover_image":"https://umdevqualquer.com.br/images/smart-tv-pixabay.jpg","cover_image_alt":"Smart Tv from pixabay","cover_image_link":"https://pixabay.com/pt/illustrations/remoto-controle-tela-tv-exploração-3653882/","cover_image_by":"Imagem retirada de PixaBay","series":[{"title":"Criando sua primeira APP para Smart TVs (Parte 2)","series":"Criando sua primeira APP para Smart TVs","slug":"criando-sua-primeira-app-para-smart-tvs-parte-2"},{"title":"Criando sua primeira APP para Smart TVs","series":"Criando sua primeira APP para Smart TVs"}],"summary":"Fala ae, tranquilinho?\n\nHoje eu estou aqui para mostrar o desenvolvimento de uma app simples para Smart Tv. Como eu havia prometido [neste post](./como-e-o-desenvolvimento-para-smart-tvs.html). Recomendo a leitura, é","slug":"criando-sua-primeira-app-para-smart-tvs","content":"Fala ae, tranquilinho?\n\nHoje eu estou aqui para mostrar o desenvolvimento de uma app simples para Smart Tv. Como eu havia prometido [neste post](./como-e-o-desenvolvimento-para-smart-tvs.html). Recomendo a leitura, é uma boa introdução.\n\nTendo a ideia de tentar passar por boa partes dos problemas que temos quando desenvolvemos app para TVs, pensei em vários tipos diferentes de exemplo de apps: galeria de fotos, app de streaming de música, app de streaming de animes (~~para ter uma experiência melhor que a sua, Crunchyroll~~)... Porém para ser algo mais rápido e simples, eu tive que me conter 🤪\n\n## O Projeto:\n\nCom isso em mente, a escolha que mais se encaixou nesses requistos foi: **app que simula um catálogo de animes/mangá**.\nApós essa série de posts, se vocês quiserem, eu faço um mais \"real\", com request a várias APIs, player para tocar algo, entre outras coisas (*Não se esqueça de comentar!!*). Será um app relativamente simples, porém como o post ficará muito logo eu irei criar uma série de posts. E lembrando: esse será um projeto web hosted focado para as Smart Tvs da Samung (Tizen) e LG (WebOs).\n\nNesse projeto nós iremos desde a criação de uma app na sua máquina até você ver ela funcionando na sua TV 😆. Com isso ensinarei como fazer uma app e quais seriam os passos para publicar a sua app.\n\n## Ferramentas:\n\nBasicamente nós iremos utilizar essa stack para desenvolver:\n\n*   React\n*   Webpack\n*   Jest\n*   HTML/CSS\n*   \u003cstrike\u003eStackoverflow\u003c/strike\u003e\n\nPorém, você é livre para escolher a sua, podendo utilizar qualquer framework para desenvolver. *Vue.js, React, Flutter, JS Vanilla*, são alguns exemplos. Você só não pode esquercer de duas premissas: **compatibilidade** e **performance**! Então vamos fazer essa bagaça funcionar!!!\n\n### Configurando o projeto:\n\n![E la vamos nós](./images/criando-sua-primeira-app-para-smart-tvs/tenor.png)\n\n\u003ccenter\u003e\u003cbr/\u003e\u003csup\u003eCreditos: google\u003c/sup\u003e\u003c/center\u003e\n\nAqui é aquela configuração padrao: aquele nosso `create-react-app` básico (se você não tem o *create-react-app* é só usar o `npm install -g create-react-app`). Com isso, já começamos a ter a nossa estrutura inicial.\n\n```bash\n$ create-react-app my-first-smart-tv-app\n```\n\nNota: *Para fins práticos e educacionais, eu não irei otimizar a nossa app ao máximo, me atentarei para o funcionamento básico de uma app.*\n\nContinuando, agora está na hora de adicionar o babel e o webpack, segue os comandos:\n\n```bash\n# Webpack\n$ yarn add -D webpack webpack-cli webpack-dev-server html-webpack-plugin html-loadert\n# babel\n$ yarn add -D @babel/core babel-loader @babel/preset-env @babel/preset-react babel-preset-es2015\n# Sass/css\n$ yarn add -D sass-loader node-sass css-loader mini-css-extract-plugin\n```\n\nÉ necessário fazer algumas configurações para o funcionamento do webpack/babel após a instalação, como eu mexi em vários arquivos, [aqui está o commit com essas modificações](https://github.com/paulopotter/my-first-smart-tv-app/commit/6a5b5f4).\n\nCom isso nós já temos a estrutura da nossa APP.\n\n### Começando o desenvolvimento:\n\nAntes que eu me esqueça, estarei postando essa [app no github](https://github.com/paulopotter/my-first-smart-tv-app), com isso se você quiser apenas o resultado final, estará tudo documentado lá.\n\nAgora vamos começar a codar de verdade, para isso vamos fazer um request para a API que vai nos entregar os dados que a gente precisa, para isso vamos utilizar o [Jikan](https://jikan.moe/?ref=public-apis). O Jikan é uma API não oficial do [My Anime List](https://myanimelist.net), ela é bem completinha para o que iremos fazer 😆. E para ele existe um *wrapper* em js ([jikanjs](https://github.com/zuritor/jikanjs)) para facilitar ainda mais a nossa vida, para instalar basta rodar.\n\n```bash\n$ yarn add jikanjs\n```\n\nCom isso já temos acesso a api, você pode fazer um teste colocando no `App.js` o seguinte trecho de código:\n\n```jsx\nrender() {\n  jikanjs\n  .loadSeasonLater()\n  .then((response) =\u003e {\n      response.anime.forEach(element =\u003e {\n          console.log(`${element.mal_id}: ${element.title} - ${element.image_url} - ${element.type}`);\n      })\n  }).catch((err) =\u003e {\n      console.error(err); // in case a error happens\n  });\n  return \u003ch1\u003e Hello World :) \u003c/h1\u003e;\n}\n```\n\nAbra o seu console e você verá a resposta do servidor.\n\nVamos colocar esses dados na tela, e para isso vamos criar uma estrutura HTML:\n\n```jsx\ntmpl(anime){\n  const {image_url, title, mal_id, type} = anime\n\n  return (\n    \u003cdiv className=\"poster-wrapper\" id={mal_id} key={mal_id}\u003e\n      \u003cfigure\u003e\n        \u003cspan\u003e{type}\u003c/span\u003e\n        \u003cimg src={image_url} alt={title} /\u003e\n        \u003cp\u003e{title}\u003c/p\u003e\n      \u003c/figure\u003e\n    \u003c/div\u003e\n  )\n\n}\n```\n\ne depois vamos fazer o request, para isso vamos adicionar o `state` e o `componentDidMount`:\n\n```jsx\nconstructor(props) {\n  super(props)\n  this.state = {\n      animes: []\n  }\n}\n\ncomponentDidMount() {\n  let animes = []\n  jikanjs\n  .loadSeasonLater()\n  .then((response) =\u003e {\n      response.anime.forEach(element =\u003e {\n          animes.push(element);\n      })\n      this.setState({ animes })\n  }).catch((err) =\u003e {\n      console.error(err); // in case a error happens\n  });\n}\n```\n\nE agora vamos adicionar no `render` o conteúdo.\n\n```jsx\nrender() {\n    let animes = this.state.animes;\n    return animes.map((anime) =\u003e (anime.type === 'TV' ? this.tmpl(anime) : null))\n}\n```\n\nPronto, com isso já temos todos os itens sendo exibidos na página!\n\n### Vamos passar a primeira maquiagem:\n\nA ideia aqui é só tornar a nossa visualização melhor, não tem muita regra e ainda nem adicionei um pré-processador.\n\n```css\nbody {\n  background-color: #0f0f0f;\n  color: #f1f1f1;\n}\n\n.poster-wrapper {\n  display: inline-block;\n  text-align: center;\n  width: 310px;\n}\n\n.poster-wrapper--active {\n  outline: 1px solid #f1f1f1;\n}\n```\n\n### Test, Jest everywhere...\n\nNós não podemos esquecer de fazer os testes da nossa app (*ou de qualquer código que façamos*), para isso vamos instalar o jest:\n\n```bash\n$ yarn add -D jest babel-jest enzyme jest-environment-enzyme jest-enzyme enzyme-adapter-react-16 identity-obj-proxy\n$ yarn jest --init\n```\n\nna linha 2 a gente cria a configuração inicial do jest automaticamente, é só seguir a sequência `jsdom, y, y`, com isso ele cria um arquivo chamado `jest.config.js`. Nele faça a modificação nas linhas 82, 129, 135 e 144:\n\n```js\nmoduleNameMapper: { // 82\n  \"\\\\.(css|sass)$\": \"identity-obj-proxy\",\n},\nsetupFilesAfterEnv: [\"\u003crootDir\u003e/src/setupTests.js\"], // 129\ntestEnvironment: \"enzyme\", // 135\ntestMatch: [ // 144\n  \"**/*.test.js\",\n],\n```\n\nTambém precisamos criar o arquivo `src/setupTest.js` e dentro dele colocar:\n\n```jsx\nimport { configure } from \"enzyme\";\nimport Adapter from \"enzyme-adapter-react-16\";\nconfigure({ adapter: new Adapter() });\n```\n\nCom isso só falta alterar o nosso `package.json` para rodar os testes e coverage:\n\n```json\n{\n  // ...\n  scripts: {\n    // ...\n    \"test\": \"jest\",\n    \"test:coverage\": \"jest --coverage\"\n  }\n}\n```\n\nTambém adicionei o ESLint, para ver como ficou, olhe [esse commit](https://github.com/paulopotter/my-first-smart-tv-app/commit/853e5bf).\n\n## Navegação\n\nPara fazer a navegação, eu vou adicionar uma classe para indicar a seleção:\n\n```jsx\ntmpl(anime, i) {\n    // ...\n        \u003cdiv className={`poster-wrapper ${this.state.activeItem === i ? 'poster-wrapper--active': null}`} id={mal_id} key={mal_id}\u003e\n    // ...\n}\n\nrender() {\n    // ...\n    return animes.map((anime, i) =\u003e (anime.type === 'TV' ? this.tmpl(anime, i) : null))\n    // ...\n}\n```\n\ne agora a gente ouve os eventos do teclado:\n\n```jsx\nonKeyDown(e) {\n    const { activeItem, animes } = this.state\n    let newActiveItem = activeItem\n    switch (e.keyCode) {\n      case 37: // left\n        if (activeItem !== 0) {\n          newActiveItem -= 1\n        }\n        break\n\n      case 39: // right\n        if (activeItem \u003c animes.length) {\n          newActiveItem += 1\n        }\n        break\n\n      case 40: // down\n        if (activeItem \u003c animes.length) {\n          if (activeItem + 4 \u003e animes.length) {\n            newActiveItem = animes.length\n          } else {\n            newActiveItem += 4\n          }\n        }\n        break\n      case 38: // up\n        if (activeItem \u003c animes.length) {\n          if (activeItem - 4 \u003c 0) {\n            newActiveItem = 0\n          } else {\n            newActiveItem -= 4\n          }\n        }\n        break\n      default:\n        break\n    }\n    this.setState({\n      activeItem: newActiveItem\n    })\n  }\n```\n\npara essa função funcionar a gente ainda precisa adicionar as seguintes linhas:\n\n```jsx\nconstructor(props) {\n  // ...\n  this.onKeyDown = this.onKeyDown.bind(this)\n}\ncomponentDidMount() {\n  // ...\n    this.enableKeyEvent()\n}\n\ncomponentWillUnmount() {\n    this.disableKeyEvent()\n}\n\nenableKeyEvent() {\n    document.addEventListener('keydown', this.onKeyDown, true)\n}\n\ndisableKeyEvent() {\n    document.removeEventListener('keydown', this.onKeyDown, true)\n}\n```\n\n## That\\`s it\n\nÉ isso, para a nossa primeira parte isso já é o suficiente para começar a brincar ( e porque se eu continuar o post vai demorar 3 horas para ser lido 🤪)\nPara ver todos os commits desse post, acesse [essa tag no github](https://github.com/paulopotter/my-first-smart-tv-app/releases/tag/post-1)\n\nNo próximo post, nós teremos a continuação dos testes, fix de alguns bugs e criação de algum evento para quando selecionar-mos um item.\n\nQualquer dúvida, critica ou sugestão utilizem os comentários e até a próxima!!\n","readingTime":"6 min","related":{"nextPost":{"title":"Criando sua primeira APP para Smart TVs (Parte 2)","date":"2020-04-09","slug":"criando-sua-primeira-app-para-smart-tvs-parte-2"},"prevPost":{"title":"Como é o desenvolvimento para Smart TVs","date":"2019-10-09","slug":"como-e-o-desenvolvimento-para-smart-tvs"}}}},"__N_SSG":true},"page":"/[slug]","query":{"slug":"criando-sua-primeira-app-para-smart-tvs"},"buildId":"BHi7l169sg06t5aPl75mJ","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body><link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;1,700&amp;family=Montserrat:wght@400;700&amp;display=swap" rel="stylesheet"/></html></body></html>
